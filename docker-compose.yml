services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gwap
      POSTGRES_PASSWORD: gwap
      POSTGRES_DB: gwap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gwap -d gwap"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://gwap:gwap@postgres:5432/gwap
      STORAGE_ROOT: /app/data/storage
      CORS_ORIGINS: http://localhost:8080
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  backend_data:
