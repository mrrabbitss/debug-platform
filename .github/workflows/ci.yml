name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      APP_ENV: test
      AUTH_MODE: local
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./backend[dev]"
      - run: python -m ruff check backend/app backend/tests scripts
      - run: python -m compileall -q backend/app backend/tests scripts
      - run: python -m pytest -q
        working-directory: backend

  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
        working-directory: vscode-extension
      - run: npm run compile
        working-directory: vscode-extension

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./backend[dev]"
      - run: python -m pip_audit
      - run: npm audit --omit=dev --audit-level=high
        working-directory: frontend
      - run: npm audit --omit=dev --audit-level=high
        working-directory: vscode-extension

  external-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine3.24
        env:
          POSTGRES_USER: gwap
          POSTGRES_PASSWORD: gwap
          POSTGRES_DB: gwap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gwap -d gwap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      qdrant:
        image: qdrant/qdrant:v1.18.3
        ports:
          - 6333:6333
    env:
      APP_ENV: test
      AUTH_MODE: local
      LLM_PROVIDER: mock
      DATABASE_URL: postgresql+psycopg://gwap:gwap@127.0.0.1:5432/gwap
      QDRANT_URL: http://127.0.0.1:6333
      RUN_EXTERNAL_SERVICE_TESTS: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./backend[dev]"
      - name: Wait for Qdrant readiness
        run: |
          python - <<'PY'
          import time
          import urllib.request

          for attempt in range(60):
              try:
                  urllib.request.urlopen("http://127.0.0.1:6333/readyz", timeout=2).read()
                  break
              except Exception:
                  if attempt == 59:
                      raise
                  time.sleep(1)
          PY
      - run: python -m pytest -q tests/test_external_services.py
        working-directory: backend

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose config --quiet
      - run: docker build --tag gw-ap-debug-backend:ci backend
      - run: docker build --tag gw-ap-debug-frontend:ci frontend

  windows-runtime-smoke:
    runs-on: windows-latest
    env:
      APP_ENV: test
      AUTH_MODE: local
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m venv .venv
      - run: .\.venv\Scripts\python.exe -m pip install --upgrade pip
      - run: .\.venv\Scripts\python.exe -m pip install -e ".\backend[dev]"
      - run: npm ci
        working-directory: frontend
      - name: Run isolated backend/frontend smoke test
        shell: powershell
        run: powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts\runtime_smoke.ps1
